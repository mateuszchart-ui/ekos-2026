<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKOS 2026 - Biuro Informacji Turystycznej</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e8f4f8, #f7fbfc);
    color:#1f2d3a;
}

.app{
    max-width: 760px;
    margin: 30px auto;
    background: #ffffff;
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
}

.header{
    text-align:center;
    margin-bottom: 20px;
}

.logo{
    font-size: 28px;
    font-weight: bold;
    color:#0a7c66;
}

.subtitle{
    font-size: 16px;
    color:#555;
}

.station-box{
    background:#f0f7f6;
    padding:14px;
    border-radius:12px;
    margin:20px 0;
    text-align:center;
    font-weight:bold;
}

.section{
    margin-top:18px;
    padding:14px;
    border:1px solid #e6e6e6;
    border-radius:12px;
    background:#fff;
}

select, input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:14px;
    background:#0a7c66;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#07584a;
}

button:active{
    transform: scale(0.98);
}

.link-box{
    margin-top:18px;
    padding:14px;
    border-radius:12px;
    background:#eaf3ff;
    text-align:center;
    display:none;
}

.message{
    margin-top:12px;
    font-weight:bold;
    text-align:center;
}

#waygroundLink{
    display:inline-block;
    margin-top:10px;
    padding:12px 18px;
    background:#1976d2;
    color:white;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.success{
    background:#e7fff1 !important;
    border:2px solid #1bbf6b !important;
}

.error{
    background:#ffecec !important;
    border:2px solid #e74c3c !important;
}

.fade-in{
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <div class="logo">🧭 EKOS 2026</div>
        <div class="subtitle">Biuro Informacji Turystycznej</div>
    </div>

    <div class="station-box">
        📍 STACJA: <span id="stationNumber">1</span>
    </div>

    <div class="section">
        <label><strong>Wybierz klasę</strong></label>
        <select id="classSelect">
            <option value="1LO">I LO</option>
            <option value="2LO">II LO</option>
            <option value="3LO">III LO</option>
        </select>
    </div>

    <div class="section">
        <label><strong>Hasło z filmu</strong></label>
        <input type="text" id="passwordInput" placeholder="Wpisz hasło...">

        <button onclick="checkPassword()">ODKODUJ STACJĘ</button>

        <div class="message" id="messageBox"></div>
    </div>

    <div class="link-box" id="linkBox">
        <p>✔ Stacja odblokowana</p>
        <a id="waygroundLink" href="#" target="_blank">
            ➜ Przejdź do zadania
        </a>
    </div>

</div>

<script>
// =========================
// STACJA Z QR
// =========================
const urlParams = new URLSearchParams(window.location.search);
const station = parseInt(urlParams.get("stacja") || "1");

document.getElementById("stationNumber").innerText = station;

// =========================
// PAMIĘĆ KLASY
// =========================
const classSelect = document.getElementById("classSelect");
const savedClass = localStorage.getItem("ekos_class");

if (savedClass) classSelect.value = savedClass;

classSelect.addEventListener("change", () => {
    localStorage.setItem("ekos_class", classSelect.value);
});

// =========================
// HASŁA
// =========================
const PASSWORDS = {
    "1LO": {
        1: "RATHAUS",
        2: "BRUNNEN",
        3: "DENKMAL",
        4: "ROUTE",
        5: "EMPFEHLUNG"
    },
    "2LO": {
        1: "TOURISTINFO",
        2: "WEG",
        3: "TOURIST",
        4: "PLAN",
        5: "REISE"
    },
    "3LO": {
        1: "MARKTPLATZ",
        2: "ZENTRUM",
        3: "FOTO",
        4: "STADTPLAN",
        5: "DEUTSCHLAND"
    }
};

// =========================
// LINKI DO STACJI (VIDEO + QUIZ)
// =========================
const LINKS = {
    "1LO": {
        1: "stacje/1/1LO.html",
        2: "stacje/2/1LO.html",
        3: "stacje/3/1LO.html",
        4: "stacje/4/1LO.html",
        5: "stacje/5/1LO.html"
    },
    "2LO": {
        1: "stacje/1/2LO.html",
        2: "stacje/2/2LO.html",
        3: "stacje/3/2LO.html",
        4: "stacje/4/2LO.html",
        5: "stacje/5/2LO.html"
    },
    "3LO": {
        1: "stacje/1/3LO.html",
        2: "stacje/2/3LO.html",
        3: "stacje/3/3LO.html",
        4: "stacje/4/3LO.html",
        5: "stacje/5/3LO.html"
    }
};

// =========================
// ELEMENTY
// =========================
const passwordInput = document.getElementById("passwordInput");
const messageBox = document.getElementById("messageBox");
const linkBox = document.getElementById("linkBox");
const waygroundLink = document.getElementById("waygroundLink");

// =========================
// LOGIKA HASŁA
// =========================
function checkPassword(){

    const selectedClass = classSelect.value;
    const enteredPassword = passwordInput.value.trim().toUpperCase();
    const correctPassword = PASSWORDS[selectedClass]?.[station];

    localStorage.setItem("ekos_class", selectedClass);

    document.querySelector(".section").classList.remove("success","error");

    if (enteredPassword === correctPassword) {

        messageBox.style.color = "#1bbf6b";
        messageBox.innerHTML = "✔ Hasło poprawne! Stacja odblokowana.";

        linkBox.style.display = "block";
        waygroundLink.href = LINKS[selectedClass][station];

        document.querySelector(".section").classList.add("success","fade-in");

    } else {

        messageBox.style.color = "#e74c3c";
        messageBox.innerHTML = "✘ Błędne hasło.";

        linkBox.style.display = "none";

        document.querySelector(".section").classList.add("error","fade-in");
    }
}

// =========================
// START
// =========================
window.onload = () => {
    document.querySelector(".app").classList.add("fade-in");
};
</script>

</body>
</html>
