<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKOS 2026 - Stacja</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f7f9;
}

.container{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:22px;
    border-radius:16px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.header{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#0a7c66;
    margin-bottom:10px;
}

.subheader{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.video{
    text-align:center;
    margin-top:20px;
}

.button{
    display:inline-block;
    margin-top:10px;
    padding:12px 18px;
    background:#0a7c66;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}

.info{
    margin-top:20px;
    background:#eaf3ff;
    padding:15px;
    border-radius:12px;
    text-align:left;
}

.quiz{
    margin-top:25px;
    text-align:center;
}

.quiz a{
    display:inline-block;
    padding:14px 20px;
    background:#1976d2;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <!-- 📍 STACJA -->
    <div class="header">
        📍 STACJA 1 – III LO
    </div>

    <div class="subheader">
        Biuro Informacji Turystycznej
    </div>

    <!-- 🎬 FILM -->
    <div class="video">

        <p><strong>🧭 kontekst fabularny</strong></p>

        <a class="button" href="https://share.descript.com/view/5vWJHOiwMMB" target="_blank">
            ▶ Obejrzyj film
        </a>

    </div>

    <!-- 🧭 INSTRUKCJA -->
    <div class="info">
        <strong>Instrukcja:</strong><br>
        🎬 Obejrzyj film, aby uzyskać kod do quizu.
    </div>

    <!-- 🔗 WAYGROUND -->
    <div class="quiz">
        <a href="https://wayground.com/join" target="_blank">
            ➜ Przejdź do Quizizz / Wayground
        </a>
    </div>

</div>

</body>
</html>
